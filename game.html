<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"><title>Play — AlgoVian Quiz Battle</title><meta name="description" content="Quiz battles on algorithm concepts — vs AI, vs Friend, or in tournament."></head>
<body>
<header id="navbar"></header>
<div class="container">
  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="ai">vs AI</div>
    <div class="mode-tab" data-mode="friend">vs Friend</div>
    <div class="mode-tab" data-mode="tour">Tournament</div>
  </div>

  <section id="mode-ai" class="mode-panel active">
    <div class="battle">
      <div class="players">
        <div class="player-card">
          <div class="avatar you">YO</div>
          <div><div class="name">You</div><div class="score" id="youScore">Score: 0</div></div>
        </div>
        <div class="vs">VS</div>
        <div class="player-card">
          <div class="avatar bot">AI</div>
          <div><div class="name">AlgoBot</div><div class="score" id="botScore">Score: 0</div></div>
        </div>
      </div>
      <div class="question-card">
        <div class="timer" id="timer">15s</div>
        <div style="font-size:12px;color:var(--text-secondary)">Question</div>
        <div class="q-text" id="qText"></div>
        <div class="options" id="options"></div>
        <div id="ai-thinking" class="ai-thinking hidden">AlgoBot is thinking<span>.</span><span>.</span><span>.</span></div>
        <div class="hint-container" style="margin-top: 15px; text-align: center;">
          <button id="getHintBtn" class="btn" style="background: #eab308; color: #fff; display: none;">Get Hint (-2 pts)</button>
          <div id="hintBox" class="hint-box hidden"></div>
        </div>
        <div class="dots" id="dots"></div>
      </div>
    </div>
  </section>

  <section id="mode-friend" class="mode-panel">
    <div class="center-card">
      <h3>Play with a friend</h3>
      <p>Share this room code with a friend so they can join your battle.</p>
      <div class="code-box" id="roomCode">ALG-447</div>
      <button class="btn btn-secondary" id="copyCode">Copy code</button>
      <p style="margin-top:18px">Waiting for opponent…</p>
    </div>
  </section>

  <section id="mode-tour" class="mode-panel">
    <div class="bracket">
      <div class="bracket-card you"><span>You</span><span class="lbl">QF · Win</span></div>
      <div class="bracket-card"><span>Mei Tanaka</span><span class="lbl">QF · Win</span></div>
      <div class="bracket-card"><span>Liam O'Connor</span><span class="lbl">QF · Loss</span></div>
      <div class="bracket-card"><span>Sofia Rossi</span><span class="lbl">QF · Loss</span></div>
    </div>
  </section>
</div>
<script src="js/navbar.js"></script>
<script src="js/api.js"></script>
<script src="js/game.js"></script>
</body></html>
