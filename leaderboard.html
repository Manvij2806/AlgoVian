<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"><title>Leaderboard — AlgoVian</title><meta name="description" content="Top AlgoVian players ranked by score, wins, and skill level."></head>
<body>
<header id="navbar"></header>
<div class="container">
  <div class="section-head"><h2>Leaderboard</h2><p>Top algorithm players, ranked by score.</p></div>
  <div class="lb-tabs">
    <div class="lb-tab active" data-range="all">All time</div>
    <div class="lb-tab" data-range="week">This week</div>
    <div class="lb-tab" data-range="today">Today</div>
  </div>
  <table class="lb-table">
    <thead><tr><th>Rank</th><th>Player</th><th>Score</th><th>Wins</th><th>Level</th></tr></thead>
    <tbody id="lbBody"></tbody>
  </table>
</div>
<script src="js/navbar.js"></script>
<script src="js/leaderboard.js"></script>
</body></html>
